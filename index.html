<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tienda con DummyJSON - API</title>
    <link rel="stylesheet" href="style.css" />
    <!--   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.3.0/css/all.min.css"
        integrity="sha512-F/yRpRY8sctKzP7exU5PLGejwg/QtjDX6CIy/41nApe7JqdZgCcCzJTNq9Rcp/XwbeeTGillGevBakruY15pxA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" /> -->

</head>

<body>
    <header>
        <div id="header" class="contenido">
            <div class="logo">
                <img src="img/Gemini_Generated_Image_cgpzhlcgpzhlcgpz.png" alt="Logo drummy" />
            </div>
            <div class="iconos" id="caja ico">

                <img src="img/icons/location_4679.png" alt="localizacion" width="30px">
                <img src="img/icons/hearts_heart_love_favorite_5565.png" alt="click me gusta" width="30px">
                <img src="img/icons/user_21980.png" alt="tu usurio" width="30px">
                <img src="img/icons/shop_shopping_bag_icon_144577.png" alt="tienda" width="40px">

                <i class="fa-solid fa-location-dot"></i>
                <i class="fa-solid fa-heart"></i>
                <i class="fa-solid fa-user"></i>
                <i class="fa-solid fa-shop"></i>
            </div>
        </div>


    </header>

    <aside class="barraLateral">
        <form class="buscador">
            <input type="text" id="buscar" placeholder="¿Qué estas buscando?" />
            <button type="button" id="boton">Buscar</button>
        </form>

        <section class="categoria">
            <h2>Categorias</h2>
            <select name="filtrarCategoria" id="filtrarCategoria" size="20">
                <option value="todas">Todas las categorías</option>
            </select>
            <h2>Precio</h2>
            <input type="number" id="filtrarPrecio" min="10" placeholder="Precio minimo" />
        </section>
    </aside>

    <main>
        <p id="cargando">Cargando productos...</p>
        <section class="container" aria-label="Listado de productos"></section>
    </main>

    <div id="modal" class="modal oculto">
        <div class="modal-contenido">
            <span id="cerrarModal" class="cerrar">&times;</span>


            <div id="modalGaleria">



            </div>



            <h2 id="modalTitulo"></h2>
            <p id="modalDescripcion"></p>
            <h3 id="modalPrecio"></h3>
            <p id="modalCategoria"></p>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>

</html>
